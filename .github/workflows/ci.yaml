name: CI
on:
  pull_request:
  push:
    branches:
    - main
jobs:
  test-node:
    name: test on ${{ matrix.os }} amd64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      matrix:
        # removing macos-latest since libwebrtc is not available on macos
        os: [ubuntu-22.04]
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-go@v6
      with:
        go-version-file: "go.mod"
    - uses: pnpm/action-setup@v5
      with:
        # Check the https://github.com/pnpm/pnpm/releases and update the version.
        version: 10
    - shell: bash
      run: |
        ./ci.sh
    - name: Install goveralls
      run: go install github.com/mattn/goveralls@latest
    - name: Upload coverage
      env:
        COVERALLS_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
      run: goveralls -coverprofile=internal.covprofile,e2e.covprofile,seed.covprofile -service=github