<!doctype html>
<html lang="ja">

<head>
  <title>test colonio</title>
  <meta charset="utf-8">
</head>

<body>
  <div id="result"></div>
  <script src="wasm_exec.js" type="text/javascript"></script>
  <script src="colonio.js" type="text/javascript"></script>
  <script type="text/javascript">
    const go = new Go();
    go.exit = (code) => {
      if (code === 0) {
        console.log("SUCCESS");
      } else {
        console.log("exit code: " + code)
        console.log("FAIL");
      }
    }
    WebAssembly.instantiateStreaming(fetch("tests/network.wasm"), go.importObject).then((result) => {
      go.run(result.instance);
    }).catch((err) => {
      console.error(err.toString());
      console.log("FAIL")
    });
  </script>
</body>

</html>
